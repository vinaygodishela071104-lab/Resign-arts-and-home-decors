<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Resique Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="signin.css" />
  </head>

  <body>
    <div class="top-actions">
      <button class="rtl-btn">RTL</button>

      <button class="dark-btn">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>

    <div class="signup-card">
      <div class="logo">
        <a href="index.html"> <span>Res</span>ique</a>

        <p>Create your premium resin decor account</p>
      </div>

      <form>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>

            <input type="text" placeholder="Enter first name" />
          </div>

          <div class="form-group">
            <label>Last Name</label>

            <input type="text" placeholder="Enter last name" />
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>

          <input type="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>

          <input type="tel" placeholder="Enter phone number" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Password</label>

            <div class="password-box">
              <input
                type="password"
                placeholder="Create password"
                id="password"
              />

              <i class="fa-solid fa-eye" id="eye"></i>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>

            <div class="password-box">
              <input
                type="password"
                placeholder="Confirm password"
                id="confirmPassword"
              />

              <i class="fa-solid fa-eye" id="confirmEye"></i>
            </div>
          </div>
        </div>

        <div class="terms">
          <input type="checkbox" />

          <label>
            I agree to the
            <span>Terms & Conditions</span>
            and
            <span>Privacy Policy</span>
          </label>
        </div>

        <button class="signup-btn">Create Account</button>
      </form>

      <div class="divider">
        <span>OR SIGN UP WITH</span>
      </div>

      <div class="social-login">
        <button class="social-btn">Google</button>

        <button class="social-btn">Apple</button>
      </div>

      <div class="login-text">
        Already have an account?
        <a href="login.html"> Login </a>
      </div>
    </div>

    <script>
      const password = document.getElementById("password");
      const eye = document.getElementById("eye");

      eye.addEventListener("click", () => {
        if (password.type === "password") {
          password.type = "text";
          eye.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          password.type = "password";
          eye.classList.replace("fa-eye-slash", "fa-eye");
        }
      });

      const darkBtn = document.querySelector(".dark-btn");

      darkBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");
      });

      const rtlBtn = document.querySelector(".rtl-btn");

      rtlBtn.addEventListener("click", () => {
        if (document.documentElement.dir === "rtl") {
          document.documentElement.dir = "ltr";
        } else {
          document.documentElement.dir = "rtl";
        }
      });
    </script>
  </body>
</html>
