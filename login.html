<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Resique Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
   

    <div class="login-card">
       <div class="top-actions">
      <button class="rtl-btn">
        <i class="fa-solid">RTL</i>
      </button>

      <button class="dark-btn">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
      <div class="logo">
        <a href="index.html"> <span>Res</span>ique</a>
        <p>Premium Resin Arts & Home Decor Studio</p>
      </div>

      <form>
        <div class="form-group">
          <label>Email Address</label>

          <input type="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label>Password</label>

          <div class="password-box">
            <input
              type="password"
              placeholder="Enter your password"
              id="password"
            />

            <i class="fa-solid fa-eye" id="eye"></i>
          </div>
        </div>

        <div class="form-options">
          <div class="remember">
            <input type="checkbox" />
            <span>Remember Me</span>
          </div>

          <a href="forget.html" class="forgot"> Forgot Password? </a>
        </div>

        <button class="login-btn">Login</button>
      </form>

      <div class="divider">
        <span>Or continue with</span>
      </div>

      <div class="social-login">
        <button class="social-btn">
          <i class="fa-brands fa-google"></i>
          Continue with Google
        </button>

        <button class="social-btn">
          <i class="fa-brands fa-apple"></i>
          Continue with Apple
        </button>
      </div>

      <div class="signup-text">
        Don’t have an account?
        <a href="signin.html">Create Account</a>
      </div>
    </div>

    <script>
      const password = document.getElementById("password");
      const eye = document.getElementById("eye");

      eye.addEventListener("click", () => {
        if (password.type === "password") {
          password.type = "text";
          eye.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          password.type = "password";
          eye.classList.replace("fa-eye-slash", "fa-eye");
        }
      });

      /* =========================
   DARK MODE
========================= */

      const darkBtn = document.querySelector(".dark-btn");

      darkBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");
      });

      /* =========================
   RTL MODE
========================= */

      const rtlBtn = document.querySelector(".rtl-btn");

      rtlBtn.addEventListener("click", () => {
        if (document.documentElement.dir === "rtl") {
          document.documentElement.dir = "ltr";
        } else {
          document.documentElement.dir = "rtl";
        }
      });
    </script>
  </body>
</html>
