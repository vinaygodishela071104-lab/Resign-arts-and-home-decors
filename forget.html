<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | Resique</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="forget.css">
</head>
<body>

<div class="forgot-card">
 <div class="top-actions">
      <button class="rtl-btn">
        <i class="fa-solid">RTL</i>
      </button>

      <button class="dark-btn">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
<div class="logo">
<a href="index.html">Res<span>ique</span></a>
</div>

<div class="icon">
<i class="fa-solid fa-lock"></i>
</div>

<h1>Forgot Password?</h1>

<p class="description">
Enter your registered email address and we'll send you a password reset link.
</p>

<form>

<div class="input-group">
<input
type="email"
placeholder="Enter your email address"
required
>
</div>

<button class="reset-btn">
Send Reset Link
</button>

</form>

<div class="back-login">
Remember your password?
<a href="login.html">Back to Login</a>
</div>

</div>
<script>

const rtlBtn = document.querySelector(".rtl-btn");
const darkBtn = document.querySelector(".dark-btn");

/* =========================
   DARK MODE
========================= */

darkBtn.addEventListener("click", () => {

  document.body.classList.toggle("dark-mode");

  const icon = darkBtn.querySelector("i");

  if (document.body.classList.contains("dark-mode")) {
    icon.classList.remove("fa-moon");
    icon.classList.add("fa-sun");

    localStorage.setItem("theme", "dark");
  } else {
    icon.classList.remove("fa-sun");
    icon.classList.add("fa-moon");

    localStorage.setItem("theme", "light");
  }
});

/* Load Saved Theme */

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark-mode");

  darkBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
}

/* =========================
   RTL MODE
========================= */

rtlBtn.addEventListener("click", () => {

  document.body.classList.toggle("rtl");

  if (document.body.classList.contains("rtl")) {
    document.documentElement.setAttribute("dir", "rtl");

    localStorage.setItem("direction", "rtl");
  } else {
    document.documentElement.setAttribute("dir", "ltr");

    localStorage.setItem("direction", "ltr");
  }
});

/* Load Saved Direction */

if (localStorage.getItem("direction") === "rtl") {
  document.body.classList.add("rtl");
  document.documentElement.setAttribute("dir", "rtl");
}

</script>
</body>
</html>
